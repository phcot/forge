<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Anvil body -->
  <path d="M25 58 L30 52 L70 52 L75 58 L80 58 L80 64 L20 64 L20 58 Z" fill="url(#anvil)" opacity="0.9"/>
  <!-- Anvil base -->
  <rect x="30" y="64" width="40" height="6" rx="1" fill="#818cf8" opacity="0.7"/>
  <rect x="35" y="70" width="30" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <!-- Anvil horn (left) -->
  <path d="M25 58 L15 55 L15 52 L25 52 Z" fill="url(#anvil)" opacity="0.85"/>

  <!-- Hammer -->
  <g transform="rotate(-35, 55, 38)">
    <!-- Handle -->
    <rect x="53" y="28" width="4" height="30" rx="2" fill="#94a3b8" opacity="0.8"/>
    <!-- Head -->
    <rect x="45" y="22" width="20" height="10" rx="2" fill="#c7d2fe"/>
    <rect x="45" y="22" width="20" height="5" rx="1" fill="#e0e7ff" opacity="0.6"/>
  </g>

  <!-- Sparks -->
  <circle cx="42" cy="42" r="1.5" fill="url(#spark)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="38" r="1" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="39" r="1.2" fill="#fde68a" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="38" cy="44" r="0.8" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
